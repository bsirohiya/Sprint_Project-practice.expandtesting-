[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom markers
markers =
    ui: UI tests using Selenium
    api: API tests using requests
    integration: Integration tests combining UI and API
    order: Test execution order

# Disable warnings for known issues
addopts = -v -s --alluredir=reports/allure-results


